# Default values for auth-db-app.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: skydiverkhv/db_auth_service
  #  Значение	Что делает pullPolicy
  #  Always	всегда тянет образ
  #  IfNotPresent	только если нет локально
  #  Never	не тянет вообще
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: v1.1.11

service:
  type: ClusterIP
  port: 8084

db_properties:
  url: jdbc:postgresql://postgres-hotel-db-service.postgres-db.svc.cluster.local:5433/hotel_db?currentSchema=hotel
  ddl_mode: update

resources:
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 500m
    memory: 256Mi
secret:
  name: postgres-hotel-db-secret # ✅ переименовано для ясности
  username: postgres
  password: postgres
  db: hotel_db



