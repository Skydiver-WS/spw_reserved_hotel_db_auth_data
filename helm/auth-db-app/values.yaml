# Default values for auth-db-app.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: skydiverkhv/db_auth_service
  #  Значение	Что делает pullPolicy
  #  Always	всегда тянет образ
  #  IfNotPresent	только если нет локально
  #  Never	не тянет вообще
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: v1.1.9

service:
  type: ClusterIP
  port: 8084


